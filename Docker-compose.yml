services:
  # N8N Automation - Independiente, sin autenticación
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_unitex
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Guayaquil
      - N8N_ENCRYPTION_KEY=unitex_clave_secreta_2024
      - N8N_USER_MANAGEMENT_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - unitex_network

networks:
  unitex_network:
    driver: bridge

volumes:
  n8n_data: