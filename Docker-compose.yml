services:
  # N8N Automation - Login con credenciales propias (correo y contraseña)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_unitex
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Guayaquil
      - TZ=America/Guayaquil
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENCRYPTION_KEY=unitex_n8n_key_2024_secure
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - unitex_network

networks:
  unitex_network:
    driver: bridge

volumes:
  n8n_data: